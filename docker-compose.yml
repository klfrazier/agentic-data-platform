version: "3.9"

services:

  # ─────────────────────────────────────────────
  # PostgreSQL 16 + pgvector
  # ─────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: semantic_query_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d   # auto-runs SQL on first start
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - semantic_net

  # ─────────────────────────────────────────────
  # pgAdmin 4 — DB Management UI
  # ─────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: semantic_query_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"           # single-user desktop mode
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "${PGADMIN_PORT}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - semantic_net

  # ─────────────────────────────────────────────
  # JupyterLab
  # ─────────────────────────────────────────────
  jupyter:
    image: jupyter/scipy-notebook:latest
    container_name: semantic_query_jupyter
    restart: unless-stopped
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      JUPYTER_TOKEN: ${JUPYTER_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    ports:
      - "${JUPYTER_PORT}:8888"
    volumes:
      - ./notebooks:/home/jovyan/notebooks
      - ./agent:/home/jovyan/agent
      - ./database:/home/jovyan/database
      - ./gradio_app:/home/jovyan/gradio_app
      - ./requirements.txt:/home/jovyan/requirements.txt
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c "pip install -q -r /home/jovyan/requirements.txt &&
               start-notebook.sh --NotebookApp.token='${JUPYTER_TOKEN}'"
    networks:
      - semantic_net

  # ─────────────────────────────────────────────
  # Gradio App (optional standalone service)
  # ─────────────────────────────────────────────
  gradio:
    image: python:3.12-slim
    container_name: semantic_query_gradio
    restart: unless-stopped
    working_dir: /app
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    ports:
      - "${GRADIO_PORT}:7860"
    volumes:
      - ./gradio_app:/app/gradio_app
      - ./agent:/app/agent
      - ./requirements.txt:/app/requirements.txt
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c "pip install -q -r /app/requirements.txt &&
               python /app/gradio_app/app.py"
    profiles:
      - gradio   # only starts with: docker compose --profile gradio up
    networks:
      - semantic_net

# ─────────────────────────────────────────────
# Volumes & Networks
# ─────────────────────────────────────────────
volumes:
  postgres_data:
  pgadmin_data:

networks:
  semantic_net:
    driver: bridge